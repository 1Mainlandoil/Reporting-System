# Build static site and publish to GitHub Pages (source: GitHub Actions).
# Repo Settings ? Pages ? Build and deployment ? Source: GitHub Actions.
#
# Required secrets (Settings ? Secrets and variables ? Actions):
#   VITE_SUPABASE_URL
#   VITE_SUPABASE_ANON_KEY
# Optional:
#   VITE_AUTH_REDIRECT_URL
#   VITE_IT_PORTAL_SECRET (needed for IT admin password resets on prod)

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        env:
          VITE_BASE_PATH: /Reporting-System/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_AUTH_REDIRECT_URL: ${{ secrets.VITE_AUTH_REDIRECT_URL }}
          VITE_IT_PORTAL_SECRET: ${{ secrets.VITE_IT_PORTAL_SECRET }}
        run: npm run build

      - name: SPA routing fallback (GitHub Pages has no server rewrites)
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
